<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Patient Array Display (Filter by Minimum Age)</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 24px;
      background: #f5f7fb;
      color: #0b1220;
    }
    h1 { margin: 0 0 12px 0; }
    .controls {
      background: white;
      border-radius: 10px;
      padding: 14px;
      margin: 0 0 18px 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .controls label {
      font-weight: 700;
      margin-right: 6px;
    }
    .controls input {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #cdd6e6;
      width: 140px;
      font-size: 14px;
      outline: none;
    }
    .controls input:focus {
      border-color: #1d63d6;
      box-shadow: 0 0 0 4px rgba(29,99,214,.12);
    }
    .controls button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #cdd6e6;
      background: #1d63d6;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }
    .controls button:hover { filter: brightness(1.02); }
    .controls button:active { transform: translateY(1px); }

    .controls .secondary {
      background: white;
      color: #0b1220;
    }

    .meta {
      margin-left: auto;
      font-size: 13px;
      color: #526077;
      font-weight: 700;
    }

    .patient {
      means: none; /* harmless; keeps CSS valid in older copy/pastes */
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    .patient h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }
    .section { margin-top: 10px; }
    .section-title {
      font-weight: 800;
      margin-bottom: 6px;
    }
    ul { margin: 0; padding-left: 18px; }
    li { margin-bottom: 4px; }
    .empty {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      color: #526077;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <h1>Patient Data Display</h1>

  <div class="controls">
    <div>
      <label for="minAge">Minimum age</label>
      <input id="minAge" type="number" step="1" min="0" placeholder="e.g., 50" />
    </div>
    <button id="filterBtn">Filter</button>
    <button id="resetBtn" class="secondary" type="button">Reset</button>
    <div class="meta" id="metaText">Showing 0 of 0</div>
  </div>

  <div id="output"></div>

  <script>
    /***********************
     * Example JSON (5 patients)
     ***********************/
    const patients = [
      {
        name: "Alice Smith",
        age: 65,
        male: false,
        weightKg: 68,
        sodiumValues: [
          { sodiumValue: 148, dateTimeStamp: "2026-02-01T08:00" },
          { sodiumValue: 145, dateTimeStamp: "2026-02-01T14:00" }
        ],
        waterGiven: [
          { waterGivenCC: 500, dateTimeStamp: "2026-02-01T10:00" }
        ]
      },
      {
        name: "Bob Johnson",
        age: 72,
        male: true,
        weightKg: 82,
        sodiumValues: [
          { sodiumValue: 152, dateTimeStamp: "2026-02-02T06:00" },
          { sodiumValue: 150, dateTimeStamp: "2026-02-02T12:00" }
        ],
        waterGiven: [
          { waterGivenCC: 750, dateTimeStamp: "2026-02-02T09:00" },
          { waterGivenCC: 500, dateTimeStamp: "2026-02-02T15:00" }
        ]
      },
      {
        name: "Carol Nguyen",
        age: 54,
        male: false,
        weightKg: 60,
        sodiumValues: [
          { sodiumValue: 146, dateTimeStamp: "2026-02-03T07:30" }
        ],
        waterGiven: []
      },
      {
        name: "David Lee",
        age: 40,
        male: true,
        weightKg: 90,
        sodiumValues: [
          { sodiumValue: 149, dateTimeStamp: "2026-02-04T08:00" },
          { sodiumValue: 147, dateTimeStamp: "2026-02-04T16:00" }
        ],
        waterGiven: [
          { waterGivenCC: 1000, dateTimeStamp: "2026-02-04T11:00" }
        ]
      },
      {
        name: "Emma Patel",
        age: 30,
        male: false,
        weightKg: 55,
        sodiumValues: [
          { sodiumValue: 144, dateTimeStamp: "2026-02-05T09:00" }
        ],
        waterGiven: [
          { waterGivenCC: 250, dateTimeStamp: "2026-02-05T12:00" }
        ]
      }
    ];

    const outputEl = document.getElementById("output");
    const minAgeEl = document.getElementById("minAge");
    const filterBtn = document.getElementById("filterBtn");
    const resetBtn = document.getElementById("resetBtn");
    const metaTextEl = document.getElementById("metaText");

    function setMeta(shownCount) {
      metaTextEl.textContent = `Showing ${shownCount} of ${patients.length}`;
    }

    function renderPatients(list) {
      outputEl.innerHTML = "";

      setMeta(list.length);

      if (!list.length) {
        outputEl.innerHTML = `<div class="empty">No patients match the current filter.</div>`;
        return;
      }

      list.forEach((patient, index) => {
        const patientDiv = document.createElement("div");
        patientDiv.className = "patient";

        patientDiv.innerHTML = `
          <h2>${patient.name}</h2>
          <div><b>Age:</b> ${patient.age}</div>
          <div><b>Sex:</b> ${patient.male ? "Male" : "Female"}</div>
          <div><b>Weight:</b> ${patient.weightKg} kg</div>

          <div class="section">
            <div class="section-title">Sodium Values</div>
            <ul>
              ${
                patient.sodiumValues.length === 0
                  ? "<li>None</li>"
                  : patient.sodiumValues
                      .map(sv => `<li>${sv.sodiumValue} mEq/L at ${sv.dateTimeStamp}</li>`)
                      .join("")
              }
            </ul>
          </div>

          <div class="section">
            <div class="section-title">Water Given</div>
            <ul>
              ${
                patient.waterGiven.length === 0
                  ? "<li>None</li>"
                  : patient.waterGiven
                      .map(w => `<li>${w.waterGivenCC} cc at ${w.dateTimeStamp}</li>`)
                      .join("")
              }
            </ul>
          </div>
        `;

        outputEl.appendChild(patientDiv);
      });
    }

    function applyFilter() {
      const minAge = parseInt(minAgeEl.value, 10);

      // If empty, show all
      if (Number.isNaN(minAge)) {
        renderPatients(patients);
        return;
      }

      const filtered = patients.filter(p => p.age >= minAge);
      renderPatients(filtered);
    }

    function resetFilter() {
      minAgeEl.value = "";
      renderPatients(patients);
    }

    filterBtn.addEventListener("click", applyFilter);
    resetBtn.addEventListener("click", resetFilter);

    // Nice UX: press Enter in the input to filter
    minAgeEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") applyFilter();
    });

    // Initial render
    renderPatients(patients);
  </script>

</body>
</html>
