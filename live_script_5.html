<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Patient JSON Modifier (TBW + Predicted Sodium)</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 18px; }
    textarea { width: 100%; min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin: 10px 0; }
    button { padding: 10px 14px; cursor:pointer; }
    .error { color: #b42318; white-space: pre-wrap; margin-top: 8px; }
    label { font-weight: 700; }
  </style>
</head>
<body>
  <h2>Patient JSON Modifier</h2>
  <p>
    Paste a JSON array of patients, click <b>Process</b>, then optionally download the modified JSON.
  </p>

  <div class="row">
    <button id="loadExampleBtn" type="button">Load Example</button>
    <button id="processBtn" type="button">Process</button>
    <button id="downloadBtn" type="button" disabled>Download Modified JSON</button>
  </div>

  <label for="input">Input JSON</label>
  <textarea id="input" placeholder='Paste JSON array here...'></textarea>

  <div id="error" class="error"></div>

  <label for="output">Output (Modified JSON)</label>
  <textarea id="output" readonly placeholder="Modified JSON will appear here..."></textarea>

  <script>
    const inputEl = document.getElementById("input");
    const outputEl = document.getElementById("output");
    const errorEl = document.getElementById("error");
    const processBtn = document.getElementById("processBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const loadExampleBtn = document.getElementById("loadExampleBtn");

    // Example JSON you can load with the button
    const examplePatients = [
      {
        "name": "Alice Smith",
        "age": 65,
        "male": false,
        "weightKg": 68,
        "sodiumValues": [
          { "sodiumValue": 152, "dateTimeStamp": "2026-02-02T06:00" },
          { "sodiumValue": 149, "dateTimeStamp": "2026-02-02T12:00" },
          { "sodiumValue": 147, "dateTimeStamp": "2026-02-02T18:00" }
        ],
        "waterGiven": [
          { "waterGivenCC": 500, "dateTimeStamp": "2026-02-02T08:00" },
          { "waterGivenCC": 250, "dateTimeStamp": "2026-02-02T15:00" }
        ]
      },
      {
        "name": "Bob Johnson",
        "age": 72,
        "male": true,
        "weightKg": 82,
        "sodiumValues": [
          { "sodiumValue": 156, "dateTimeStamp": "2026-02-01T07:00" },
          { "sodiumValue": 154, "dateTimeStamp": "2026-02-01T13:00" }
        ],
        "waterGiven": [
          { "waterGivenCC": 750, "dateTimeStamp": "2026-02-01T09:00" }
        ]
      }
    ];

    function setError(msg) {
      errorEl.textContent = msg || "";
      downloadBtn.disabled = true;
    }

    function clearError() {
      errorEl.textContent = "";
    }

    function parseDateTimeStamp(s) {
      // Expect "YYYY-MM-DDTHH:MM". Use Date parsing for ordering.
      const d = new Date(s);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function deepCopy(x) {
      return JSON.parse(JSON.stringify(x));
    }

    function ensureArray(x) {
      return Array.isArray(x) ? x : [];
    }

    function processPatients(patients) {
      const out = deepCopy(patients);

      out.forEach((p, idx) => {
        if (typeof p !== "object" || p === null) {
          throw new Error(`Patient at index ${idx} is not an object.`);
        }
        if (typeof p.weightKg !== "number" || !Number.isFinite(p.weightKg)) {
          throw new Error(`Patient "${p.name ?? idx}" is missing a valid numeric weightKg.`);
        }

        const sodiumArr = ensureArray(p.sodiumValues);
        if (sodiumArr.length === 0) {
          throw new Error(`Patient "${p.name ?? idx}" has no sodiumValues.`);
        }
        if (typeof sodiumArr[0].sodiumValue !== "number" || !Number.isFinite(sodiumArr[0].sodiumValue)) {
          throw new Error(`Patient "${p.name ?? idx}" first sodiumValue is missing a valid sodiumValue.`);
        }

        // 1) totalBodyWater (L) = weightKg * 0.5
        p.totalBodyWater = p.weightKg * 0.5;

        // 2) totalCations = totalBodyWater * first sodiumValue
        p.totalCations = p.totalBodyWater * sodiumArr[0].sodiumValue;

        // Prepare waterGiven sorted by time; convert CC -> L for accumulation
        const waterArr = ensureArray(p.waterGiven)
          .map((w, wIdx) => {
            const dt = parseDateTimeStamp(w.dateTimeStamp);
            if (!dt) {
              throw new Error(`Patient "${p.name ?? idx}" waterGiven[${wIdx}] has invalid dateTimeStamp: ${w.dateTimeStamp}`);
            }
            if (typeof w.waterGivenCC !== "number" || !Number.isFinite(w.waterGivenCC)) {
              throw new Error(`Patient "${p.name ?? idx}" waterGiven[${wIdx}] waterGivenCC must be a valid number.`);
            }
            const liters = w.waterGivenCC / 1000; // ✅ CC -> L
            return { ...w, _time: dt.getTime(), _liters: liters };
          })
          .sort((a, b) => a._time - b._time);

        // 3) For each sodiumValues entry except first: compute newTotalBodyWater (L) + predictedSodium
        p.sodiumValues = sodiumArr.map((sv, svIdx) => {
          const svCopy = { ...sv };

          if (svIdx === 0) {
            svCopy.newTotalBodyWater = null;
            svCopy.predictedSodium = null;
            return svCopy;
          }

          const svDt = parseDateTimeStamp(svCopy.dateTimeStamp);
          if (!svDt) {
            throw new Error(`Patient "${p.name ?? idx}" sodiumValues[${svIdx}] has invalid dateTimeStamp: ${svCopy.dateTimeStamp}`);
          }
          const svTime = svDt.getTime();

          // Sum water (in liters) up to and including sodium timestamp
          let cumulativeLiters = 0;
          for (const w of waterArr) {
            if (w._time <= svTime) cumulativeLiters += w._liters;
            else break;
          }

          const newTBW = p.totalBodyWater + cumulativeLiters; // ✅ liters
          svCopy.newTotalBodyWater = newTBW;
          svCopy.predictedSodium = p.totalCations / newTBW;

          return svCopy;
        });

        return p;
      });

      return out;
    }

    function processJSON() {
      clearError();
      outputEl.value = "";
      downloadBtn.disabled = true;

      let parsed;
      try {
        parsed = JSON.parse(inputEl.value.trim());
      } catch (e) {
        setError("Invalid JSON. Please paste a valid JSON array of patients.\n\n" + e.message);
        return;
      }

      if (!Array.isArray(parsed)) {
        setError("Input JSON must be an array of patient objects (e.g., [ { ... }, { ... } ] ).");
        return;
      }

      try {
        const modified = processPatients(parsed);
        outputEl.value = JSON.stringify(modified, null, 2);
        downloadBtn.disabled = false;
      } catch (e) {
        setError(e.message || String(e));
      }
    }

    function downloadOutput() {
      const text = outputEl.value;
      if (!text) return;

      const blob = new Blob([text], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "modified_patients.json";
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function loadExample() {
      inputEl.value = JSON.stringify(examplePatients, null, 2);
      outputEl.value = "";
      downloadBtn.disabled = true;
      clearError();
    }

    loadExampleBtn.addEventListener("click", loadExample);
    processBtn.addEventListener("click", processJSON);
    downloadBtn.addEventListener("click", downloadOutput);

    // Ctrl/Cmd+Enter to process
    inputEl.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") processJSON();
    });

    // Load example on open
    loadExample();
  </script>
</body>
</html>
